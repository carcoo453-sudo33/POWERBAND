version: '3.8'

services:
  powerband:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: powerband-app
    ports:
      - "8080:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - powerband-network

  # Optional: Add a reverse proxy for production
  nginx-proxy:
    image: nginx:alpine
    container_name: powerband-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-proxy.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - powerband
    restart: unless-stopped
    networks:
      - powerband-network
    profiles:
      - production

networks:
  powerband-network:
    driver: bridge

volumes:
  nginx-logs:
    driver: local