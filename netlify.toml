# Netlify configuration for POWERBAND
[build]
  # Build command - explicitly install all dependencies including dev
  command = "npm install && npm run build"
  
  # Directory to publish (Vite builds to 'dist')
  publish = "dist"
  
  # Environment variables for build
  environment = { NODE_VERSION = "20" }

# Production context (main branch)
[context.production]
  command = "npm install && npm run build"
  
[context.production.environment]
  NODE_ENV = "production"
  VITE_APP_TITLE = "POWERBAND — Premium Fitness Gear & Equipment"
  VITE_ENVIRONMENT = "production"

# Deploy preview context (pull requests)
[context.deploy-preview]
  command = "npm install && npm run build"
  
[context.deploy-preview.environment]
  NODE_ENV = "production"
  VITE_APP_TITLE = "POWERBAND (Preview) — Premium Fitness Gear & Equipment"
  VITE_ENVIRONMENT = "preview"

# Branch deploy context (feature branches)
[context.branch-deploy]
  command = "npm install && npm run build"

# Redirect rules for SPA (Single Page Application)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "no-referrer-when-downgrade"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://www.google-analytics.com; frame-ancestors 'self';"

# Cache static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache HTML files for shorter period
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# Cache service worker
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Preload critical resources
[[headers]]
  for = "/index.html"
  [headers.values]
    Link = "</assets/index.css>; rel=preload; as=style, </assets/index.js>; rel=preload; as=script"

# Functions directory (for future API endpoints)
[functions]
  directory = "netlify/functions"

# Development settings
[dev]
  command = "npm run dev"
  port = 8080
  publish = "dist"
  autoLaunch = false